[env]
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_CONFIG = "{{config_root}}/.sops.yaml"
SOPS_AGE_KEY_FILE = "{{env.HOME}}/.config/sops/age/keys.txt"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
JUST_UNSTABLE = "1"

[tools]
"aqua:budimanjojo/talhelper" = "3.1.9"
"aqua:casey/just" = "1.51.0"
"aqua:cilium/cilium-cli" = "0.19.2"
"aqua:cli/cli" = "2.92.0"
"aqua:charmbracelet/gum" = "0.17.0"
"aqua:cloudflare/cloudflared" = "2026.3.0"
"aqua:derailed/k9s" = "0.50.18"
"aqua:doitintl/kube-no-trouble" = "0.7.3"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.8.7"
"aqua:getsops/sops" = "3.13.0"
"aqua:helm/helm" = "4.1.4"
"aqua:helmfile/helmfile" = "1.5.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubecolor/kubecolor" = "0.6.0"
"aqua:kubernetes-sigs/kustomize" = "5.8.1"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.0"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:siderolabs/talos" = "1.13.0"
"aqua:yannh/kubeconform" = "0.7.0"

[settings]
python.uv_venv_auto = true
