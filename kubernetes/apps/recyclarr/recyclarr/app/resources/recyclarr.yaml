###################################################################################################
# Recyclarr Configuration Template: WEB-1080p (V4)                                                #
# Updated: 2024-10-02                                                                             #
# Documentation: https://recyclarr.dev                                                            #
# Note: If you are using multiple profiles in a single instance, please read the following        #
# documentation about file merging:                                                               #
# https://recyclarr.dev/reference/config-examples/#merge-single-instance                          #
# This config file is for use with Sonarr V4 only                                                 #
###################################################################################################

# Instance Definition: https://recyclarr.dev/reference/configuration/basic/
sonarr:
  tv:
    base_url: http://sonarr.sonarr.svc.cluster.local:80
    api_key: !env_var SONARR__AUTH__APIKEY

    quality_definition:
      type: series

    # v7 style
    # include:
    #   - template: sonarr-quality-definition-series
    #   # - template: sonarr-v4-quality-profile-web-1080p-alternative # overridden below
    #   # - template: sonarr-v4-custom-formats-web-1080p
    #   - config: sonarr-v4-custom-formats-web-1080p-720p.yaml

    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
        name: WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
          until_quality: WEB 1080p
          until_score: 0
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
      - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p alternative
        name: WEB-1080p-720p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
          until_quality: WEB 720p
          until_score: 0
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p
      - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p alternative, forced to 720p
        name: WEB-720p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
          until_quality: WEB 720p
          until_score: 0
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p

    # Custom Formats: https://recyclarr.dev/reference/configuration/custom-formats/
    custom_formats:
      # Optional
      # - trash_ids:
      #     # - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
      #     # - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
      #     # - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
      #     # - 06d66ab109d4d2eddb2794d21526d140 # Retags
      #     # - 1b3994c551cbb92a2c781af061f4ab44 # Scene
      #   assign_scores_to:
      #     - name: WEB-1080p
      #     - name: WEB-1080p-720p
      #     - name: WEB-720p

      - trash_ids:
          - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
        assign_scores_to:
          - name: WEB-1080p
            score: 0
          - name: WEB-1080p-720p
            score: 0
          - name: WEB-720p
            score: 0
      - trash_ids:
          - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
        assign_scores_to:
          - name: WEB-1080p
            score: -1
          - name: WEB-1080p-720p
            score: -1
          - name: WEB-720p
            score: -1

    media_naming:
      series: plex-imdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

###################################################################################################
# Recyclarr Configuration Template: HD Bluray + WEB                                               #
# Updated: 2025-05-04                                                                             #
# Documentation: https://recyclarr.dev                                                            #
# Note: If you are using multiple profiles in a single instance, please read the following        #
# documentation about file merging:                                                               #
# https://recyclarr.dev/reference/config-examples/#merge-single-instance                          #
###################################################################################################
radarr:
  movies:
    # Set the URL/API Key to your actual instance
    base_url: http://radarr.radarr.svc.cluster.local:80
    api_key: !env_var RADARR__AUTH__APIKEY

    quality_definition:
      type: movie

    # v7 style
    # include:
    #   - template: radarr-custom-formats-hd-bluray-web

    quality_profiles:
      - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB
        name: HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEB 1080p
          until_score: 0 # 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p

    custom_formats:
      # Movie Versions
      - trash_ids:
      # Uncomment any of the following lines to prefer these movie versions
          # - 570bc9ebecd92723d2d21500f4be314c # Remaster
          # - eca37840c13c6ef2dd0262b141a5482f # 4K Remaster
          # - e0c07d59beb37348e975a930d5e50319 # Criterion Collection
          # - 9d27d9d2181838f76dee150882bdc58c # Masters of Cinema
          # - db9b4c4b53d312a3ca5f1378f6440fc9 # Vinegar Syndrome
          # - 957d0f44b592285f26449575e8b1167e # Special Edition
          # - eecf3a857724171f968a66cb5719e152 # IMAX
          # - 9f6cbff8cfe4ebbc1bde14c7b7bec0de # IMAX Enhanced
        assign_scores_to:
          - name: HD Bluray + WEB

      # Optional
      - trash_ids:
          # - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          # - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
          # - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          # - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          # - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          # - f537cf427b64c38c8e36298f657e4828 # Scene
        assign_scores_to:
          - name: HD Bluray + WEB

      - trash_ids:
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        assign_scores_to:
          - name: HD Bluray + WEB
            score: 0
      # - trash_ids:
      #     - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
      #   assign_scores_to:
      #     - name: HD Bluray + WEB
      #       score: 0

    # See: https://recyclarr.dev/wiki/yaml/config-reference/media-naming/
    media_naming:
      folder: default # {Movie CleanTitle} ({Release Year})
      movie:
        rename: true
        standard: standard # {Movie CleanTitle} {(Release Year)} - plus a bunch of extra shit
