---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus-sidecar
spec:
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  interval: 1h
  values:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: America/New_York
      securityContext:
        allowPrivilegeEscalation: false
        capabilities: { drop: ["ALL"] }
        readOnlyRootFilesystem: true
        seccompProfile: { type: RuntimeDefault }
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true
      securityContext:
        allowPrivilegeEscalation: false
        capabilities: { drop: ["ALL"] }
        readOnlyRootFilesystem: true
        seccompProfile: { type: RuntimeDefault }
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
      hostnames: ["status.${SECRET_DOMAIN}"]
      parentRefs:
        - name: envoy-external
          namespace: network
        - name: envoy-internal
          namespace: network
    monitoring:
      serviceMonitor:
        enabled: true
    config:
      existingConfigMap: "{{ .Release.Name }}-configmap"
      items:
        - key: config.yaml
          path: config.yaml
    podSecurityContext:
      fsGroup: 65532
      fsGroupChangePolicy: OnRootMismatch
      runAsGroup: 65532
      runAsNonRoot: true
      runAsUser: 65532
    persistence:
      accessMode: ReadWriteOnce
      enabled: true
      size: 5Gi
      storageClass: freenas-api-iscsi-sqlite
    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 64Mi
