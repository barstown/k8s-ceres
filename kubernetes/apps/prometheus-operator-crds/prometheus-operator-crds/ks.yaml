kind: Kustomization
metadata:
  name: lidarr
spec:
  interval: 1h
  path: ./kubernetes/apps/prometheus-operator-crds/prometheus-operator-crds/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: prometheus-operator-crds
  wait: false
