---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mariadb-operator
spec:
  chart:
    spec:
      chart: *app
      version: 26.3.0
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
      interval: 15m
  dependsOn:
    - name: mariadb-operator-crds
  interval: 1h
  values:
    certController:
      enabled: false
      # securityContext:
      #   allowPrivilegeEscalation: false
      #   capabilities:
      #     drop:
      #       - ALL
      #   runAsNonRoot: true
      #   seccompProfile:
      #     type: RuntimeDefault
    metrics:
      enabled: true
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    webhook:
      cert:
        certManager:
          enabled: true
          # issuerRef:
          #   kind: ClusterIssuer
          #   name: letsencrypt-production
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
