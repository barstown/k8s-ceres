---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/tuppr.home-operations.com/talosupgrade_v1alpha1.json

apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: talos
spec:
  talos:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
    version: v1.13.0
  policy:
    rebootMode: powercycle  # Optional, default|powercycle
    stage: false            # Optional, stage upgrade
  healthChecks:
    - apiVersion: v1
      kind: Node
      expr: status.conditions.exists(c, c.type == "Ready" && c.status == "True")
  # maintenance:
  #   windows:
  #     - start: "0 2 * * 0"
  #       duration: "4h"
  #       timezone: "America/New_York"
  drain:
    deleteLocalData: true
    ignoreDaemonSets: true
    force: true
