---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sabnzbd
spec:
  chartRef:
    kind: OCIRepository
    name: sabnzbd
  interval: 1h
  values:
    controllers:
      sabnzbd:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/sabnzbd
              tag: 4.5.5@sha256:f5570c0a370596ab656db6d3baa830b90a6fd9952b71ae805d022a2dcb3db12f
            env:
              SABNZBD__PORT: &port 80
              SABNZBD__HOST_WHITELIST_ENTRIES: "{{ .Release.Name }}.${SECRET_DOMAIN}, {{ .Release.Name }}"
              TZ: America/New_York
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
              seccompProfile: { type: RuntimeDefault }
            resources:
              requests:
                cpu: 100m
                memory: 100Mi
              limits:
                cpu: 1000m
                memory: 4Gi
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            env:
              FIREWALL_INPUT_PORTS: *port
              # PORT_FORWARD_ONLY: "on"
              # SECURE_CORE_ONLY: "on"
              SERVER_COUNTRIES: "Netherlands,Switzerland"
              TZ: America/New_York
              # VPN_PORT_FORWARDING: "on"
              VPN_SERVICE_PROVIDER: protonvpn
              VPN_TYPE: wireguard
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-gluetun-secret"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { add: ["NET_ADMIN"], drop: ["ALL"] }
              readOnlyRootFilesystem: false
              runAsGroup: 0
              runAsNonRoot: false
              runAsUser: 0
              seccompProfile: { type: RuntimeDefault }
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/gluetun-entrypoint", "healthcheck"]
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 24
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/gluetun-entrypoint", "healthcheck"]
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 1
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/gluetun-entrypoint", "healthcheck"]
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 2001 # media-rw
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 2014 # sabnzbd
        runAsNonRoot: true
        runAsUser: 2014 # sabnzbd
        # supplementalGroups: [2001]
    service:
      app:
        ports:
          http:
            port: *port
    route:
      internal:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: freenas-api-iscsi
      media:
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}-media"
        advancedMounts:
          sabnzbd:
            app:
              - path: /comics
                subPath: comics
              - path: /downloads
                subPath: downloads/complete
              - path: /incomplete
                subPath: downloads/incomplete
              - path: /movies
                subPath: movies
              - path: /music
                subPath: music
              - path: /tv
                subPath: tv
      tmp:
        type: emptyDir
      tun:
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          sabnzbd:
            gluetun:
              - path: /dev/net/tun
