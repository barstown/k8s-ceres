---
# yaml-language-server: $schema=https://raw.githubusercontent.com/semaphoreui/charts/refs/heads/main/stable/semaphore/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
spec:
  chartRef:
    kind: OCIRepository
    name: semaphore
  interval: 1h
  values:
    controllers:
      semaphore:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: semaphoreui/semaphore
              tag: v2.17.38@sha256:6771256a64d848324f3726f07b688883fbb5dc257def079f0b16e6fb4d86e9dc
            env:
              ANSIBLE_HOME: /tmp/semaphore/.ansible
              ANSIBLE_HOST_KEY_CHECKING: false
              ANSIBLE_LOCAL_TEMP: /tmp/semaphore/.ansible/tmp
              ANSIBLE_PERSISTENT_CONTROL_PATH_DIR: /tmp/semaphore/.ansible/pc
              HOME: /tmp/semaphore
              SEMAPHORE_ADMIN_EMAIL: admin@localhost
              SEMAPHORE_ADMIN_NAME: "Admin"
              SEMAPHORE_ADMIN: admin
              SEMAPHORE_DB_DIALECT: postgres
              SEMAPHORE_MAX_TASKS_PER_TEMPLATE: 10
              SEMAPHORE_PORT: &port 3000
              SEMAPHORE_SCHEDULE_TIMEZONE: America/New_York
              SEMAPHORE_WEB_ROOT: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              SEMAPHORE_DB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: &secret "{{ .Release.Name }}-db-secret"
                    key: host
              SEMAPHORE_DB_NAME:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: database
              SEMAPHORE_DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: username
              SEMAPHORE_DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: password
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
              seccompProfile: { type: RuntimeDefault }
            resources:
              requests:
                cpu: 100m
                memory: 64Mi
              limits:
                cpu: 2000m
                memory: 500Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
    service:
      app:
        ports:
          http:
            port: *port
    route:
      internal:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: freenas-api-iscsi
        advancedMounts:
          semaphore:
            app:
              - path: /var/lib/semaphore
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: freenas-api-iscsi
        advancedMounts:
          semaphore:
            app:
              - path: /etc/semaphore
      tmp:
        type: emptyDir
