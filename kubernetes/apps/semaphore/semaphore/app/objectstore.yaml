---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: rustfs-s3
spec:
  configuration:
    destinationPath: s3://k8s-ceres/semaphore/semaphore-postgres
    # endpointCA:
    #   name: rustfs-secrets
    #   key: TRUENAS_CA
    endpointURL: https://truenas.lab.${INTERNAL_DOMAIN}:30292
    s3Credentials:
      accessKeyId:
        name: rustfs-secrets
        key: RUSTFS_ACCESS_KEY_ID
      secretAccessKey:
        name: rustfs-secrets
        key: RUSTFS_ACCESS_SECRET_KEY
    # wal:
    #   compression: zstd
