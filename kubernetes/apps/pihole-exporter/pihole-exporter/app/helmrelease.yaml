---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: pihole-exporter
  interval: 1h
  values:
    controllers:
      pihole-exporter:
        containers:
          app:
            image:
              repository: ekofr/pihole-exporter
              tag: latest@sha256:a890cc731a39da719ba19cfd717427d93366cd36307f069d495f37a1373ccffc
            env:
              TZ: America/New_York
              PIHOLE_HOSTNAME: 10.0.10.22,10.0.10.20
              # PIHOLE_PROTOCOL: https
              # SKIP_TLS_VERIFICATION: true
              INTERVAL: 30s
              PORT: &port 9617
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
              seccompProfile: { type: RuntimeDefault }
            resources:
              limits:
                cpu: 250m
                memory: 128Mi
              requests:
                cpu: 100m
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
            interval: 30s
            scrapeTimeout: 10s
