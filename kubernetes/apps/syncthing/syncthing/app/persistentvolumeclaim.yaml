---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: syncthing-media
  namespace: syncthing
spec:
  storageClassName: ""
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 10Ti
  volumeName: syncthing-media

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: syncthing-backups-kyle
  namespace: syncthing
spec:
  storageClassName: ""
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 500Gi
  volumeName: syncthing-backups-kyle
