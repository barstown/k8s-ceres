---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: external-pulse
spec:
  endpoints:
    - ip:
        address: 10.0.10.237
        port: 7655

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-pulse
spec:
  hostnames: ["pulse.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: external-pulse
          port: 7655
      matches:
        - path:
            type: PathPrefix
            value: /
