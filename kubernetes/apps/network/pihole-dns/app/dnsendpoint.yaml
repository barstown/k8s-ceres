---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: ceres-vip
  namespace: network
  labels:
    externaldns.scope: internal
spec:
  endpoints:
    - dnsName: "ceres.${SECRET_DOMAIN}"
      recordType: A
      targets:
        - 10.0.50.2
