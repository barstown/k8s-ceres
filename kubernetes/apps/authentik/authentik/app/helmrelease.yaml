---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  chartRef:
    kind: OCIRepository
    name: authentik
  interval: 1h
  values:
    global:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities: { drop: ["ALL"] }
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile: { type: RuntimeDefault }
    authentik:
      enabled: true
      error_reporting:
        enabled: false
    server:
      env:
        - name: AUTHENTIK_LOG_LEVEL
          value: info
      resources: &resources
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      containerPorts:
        http: &port 9000
        https: 9443
        metrics: 9300
      route:
        internal:
          enabled: true
          hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
          rules:
            - backendRefs:
                - identifier: app
                  port: *port
    worker:
      resources: *resources
      containerSecurityContext: {}
        # Not all of the following has been tested. Use at your own risk.
        # runAsNonRoot: true
        # readOnlyRootFilesystem: true
        # allowPrivilegeEscalation: false
        # seccompProfile: { type: RuntimeDefault }
        # capabilities: { drop: ["ALL"] }
    postgresql:
      enabled: false
  valuesFrom:
    - kind: Secret
      name: authentik-app-secret
      valuesKey: AUTHENTIK_SECRET_KEY
      targetPath: authentik.secret_key
    - kind: Secret
      name: &db-secret authentik-db-secret
      valuesKey: host
      targetPath: authentik.postgresql.host
    - kind: Secret
      name: *db-secret
      valuesKey: username
      targetPath: authentik.postgresql.user
    - kind: Secret
      name: *db-secret
      valuesKey: password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: *db-secret
      valuesKey: database
      targetPath: authentik.postgresql.name
